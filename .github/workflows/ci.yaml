name: ci.yaml - medicojob-resume-service

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVICE_NAME: medicojob-resume-service
  RUNTIME: python
  SONAR_PROJECT_KEY: MedicoJobs_medicojob-resume-service

jobs:
  get_email:
    name: get-email
    runs-on: ubuntu-latest
    steps:
      - name: Load notification email
        run: echo "Email notification settings loaded."

  sonar:
    name: SonarQube code quality
    runs-on: ubuntu-latest
    needs: get_email

    steps:
      - name: Checkout service
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: env.RUNTIME == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        if: env.RUNTIME == 'node'
        run: npm ci

      - name: Run Node tests when configured
        if: env.RUNTIME == 'node'
        shell: bash
        run: |
          test_script="$(node -e "const p=require('./package.json'); console.log((p.scripts && p.scripts.test) || '')")"
          if [ -z "$test_script" ] || echo "$test_script" | grep -qi 'no test specified'; then
            echo "No real npm test script configured for $SERVICE_NAME."
          else
            CI=true npm test
          fi

      - name: Run Node build when configured
        if: env.RUNTIME == 'node'
        shell: bash
        run: |
          build_script="$(node -e "const p=require('./package.json'); console.log((p.scripts && p.scripts.build) || '')")"
          if [ -z "$build_script" ]; then
            echo "No npm build script configured for $SERVICE_NAME."
          else
            npm run build
          fi

      - name: Setup Python
        if: env.RUNTIME == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        if: env.RUNTIME == 'python'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run Python tests when configured
        if: env.RUNTIME == 'python'
        shell: bash
        run: |
          if find . -maxdepth 3 -type f \( -name 'test_*.py' -o -name '*_test.py' \) | grep -q .; then
            pytest
          else
            echo "No Python tests found for $SERVICE_NAME."
          fi

      - name: SonarCloud branch scan and quality gate
        if: github.event_name == 'push'
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >-
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.projectName=${{ env.SERVICE_NAME }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.branch.name=${{ github.ref_name }}
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=600

      - name: SonarCloud pull request scan and quality gate
        if: github.event_name == 'pull_request'
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >-
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.projectName=${{ env.SERVICE_NAME }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=600
  snyk_scan:
    name: snyk-scan / snyk
    runs-on: ubuntu-latest
    needs: sonar
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Checkout service
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: env.RUNTIME == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        if: env.RUNTIME == 'node'
        run: npm ci

      - name: Setup Python
        if: env.RUNTIME == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        if: env.RUNTIME == 'python'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Setup Snyk
        uses: snyk/actions/setup@master

      - name: Snyk dependency scan
        shell: bash
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "SNYK_TOKEN is required. Add it in GitHub Secrets."
            exit 1
          fi

          if [ "$RUNTIME" = "node" ]; then
            snyk test --file=package-lock.json --severity-threshold=high || true
          else
            snyk test --file=requirements.txt --package-manager=pip --severity-threshold=high || true
          fi

  snyk_summary:
    name: snyk-scan / Snyk summary
    runs-on: ubuntu-latest
    needs: snyk_scan
    if: always()
    steps:
      - name: Print Snyk result
        run: |
          echo "Snyk result: ${{ needs.snyk_scan.result }}"

  notify:
    name: notify
    runs-on: ubuntu-latest
    needs:
      - get_email
      - sonar
      - snyk_scan
      - snyk_summary
    if: always() && (needs.sonar.result == 'failure' || needs.snyk_scan.result == 'failure')

    steps:
      - name: Checkout service
        uses: actions/checkout@v4

      - name: Resolve failure reason
        id: failure
        shell: bash
        run: |
          if [ "${{ needs.sonar.result }}" = "failure" ]; then
            echo "reason=SonarCloud analysis or quality gate failed for $SERVICE_NAME." >> "$GITHUB_OUTPUT"
            echo "report=https://sonarcloud.io/dashboard?id=$SONAR_PROJECT_KEY" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.snyk_scan.result }}" = "failure" ]; then
            echo "reason=Snyk dependency vulnerability scan failed for $SERVICE_NAME." >> "$GITHUB_OUTPUT"
            echo "report=https://app.snyk.io" >> "$GITHUB_OUTPUT"
          else
            echo "reason=Validation failed for $SERVICE_NAME." >> "$GITHUB_OUTPUT"
            echo "report=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Send validation failure email
        uses: ./.github/actions/notification-action
        with:
          status: failed
          pipeline_name: ${{ github.workflow }}
          repository_name: ${{ github.repository }}
          author: ${{ github.actor }}
          smtp_username: ${{ secrets.SMTP_USERNAME }}
          smtp_password: ${{ secrets.SMTP_PASSWORD }}
          smtp_server: ${{ secrets.SMTP_SERVER }}
          smtp_port: '587'
          mail_from: ${{ secrets.MAIL_FROM }}
          mail_to: ${{ secrets.MAIL_TO }}
          workflow_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          report_url: ${{ steps.failure.outputs.report }}
          failure_reason: |
            ${{ steps.failure.outputs.reason }}
            The pull request must not be merged until validation passes.




